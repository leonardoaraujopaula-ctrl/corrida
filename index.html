<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velocidade Extrema 2.0</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
    }
    canvas {
      border: 5px solid #00ffcc;
      box-shadow: 0 0 30px #00ffcc;
    }
    #ui {
      position: absolute;
      top: 15px;
      left: 15px;
      color: white;
      font-size: 22px;
      text-shadow: 2px 2px 4px black;
    }
    #gameOver {
      position: absolute;
      color: white;
      font-size: 55px;
      display: none;
      text-align: center;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    button {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 20px;
      background: #00ffcc;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <div id="ui">
    <div>Distância: <span id="score">0</span>m</div>
    <div>Velocidade: <span id="speed">0</span> km/h</div>
    <div>Nitro: <span id="nitro">100</span>%</div>
  </div>

  <div id="gameOver">
    <h1>GAME OVER</h1>
    <p>Distância: <span id="finalScore">0</span>m</p>
    <p>Recorde: <span id="highScore">0</span>m</p>
    <button onclick="restartGame()">Jogar Novamente</button>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const speedEl = document.getElementById("speed");
    const nitroEl = document.getElementById("nitro");
    const gameOverScreen = document.getElementById("gameOver");
    const finalScoreEl = document.getElementById("finalScore");
    const highScoreEl = document.getElementById("highScore");

    let carX = 370, carY = 450, carAngle = 0;
    let roadSpeed = 12;
    let score = 0;
    let nitro = 100;
    let usingNitro = false;
    let gameRunning = true;
    let highScore = localStorage.getItem("highScore") || 0;

    const carWidth = 55;
    const carHeight = 110;
    let keys = {};
    let obstacles = [];
    let particles = [];
    let roadLines = [];

    for (let i = 0; i < 20; i++) roadLines.push({ y: i * 40 });

    class Obstacle {
      constructor() {
        this.type = Math.random() < 0.7 ? "car" : "barrel";
        this.width = this.type === "car" ? 58 : 45;
        this.height = this.type === "car" ? 95 : 50;
        this.x = 180 + Math.floor(Math.random() * 3) * 150; // 3 faixas
        this.y = -100;
        this.speed = roadSpeed + Math.random() * 3;
      }
    }

    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.life = 25;
      }
    }

    window.addEventListener("keydown", e => keys[e.key] = true);
    window.addEventListener("keyup", e => keys[e.key] = false);

    function createParticles(x, y, amount) {
      for (let i = 0; i < amount; i++) {
        particles.push(new Particle(x + Math.random() * 40 - 20, y + carHeight));
      }
    }

    function drawRoad() {
      ctx.fillStyle = "#111";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grama
      ctx.fillStyle = "#0a3";
      ctx.fillRect(0, 0, 140, canvas.height);
      ctx.fillRect(canvas.width - 140, 0, 140, canvas.height);

      // Linhas centrais
      ctx.strokeStyle = "white";
      ctx.lineWidth = 8;
      for (let line of roadLines) {
        ctx.beginPath();
        ctx.moveTo(canvas.width/2 - 4, line.y);
        ctx.lineTo(canvas.width/2 - 4, line.y + 35);
        ctx.stroke();
        line.y += roadSpeed;
        if (line.y > canvas.height) line.y = -60;
      }
    }

    function drawCar() {
      ctx.save();
      ctx.translate(carX + carWidth/2, carY + carHeight/2);
      ctx.rotate(carAngle * Math.PI / 180);

      // Sombra
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(-carWidth/2 + 8, -carHeight/2 + 15, carWidth - 10, carHeight - 25);

      // Carro
      ctx.fillStyle = "#00ddff";
      ctx.fillRect(-carWidth/2, -carHeight/2, carWidth, carHeight);

      // Janela
      ctx.fillStyle = "#112233";
      ctx.fillRect(-carWidth/2 + 8, -carHeight/2 + 18, carWidth - 16, 38);

      // Detalhes
      ctx.fillStyle = "#ff0088";
      ctx.fillRect(-carWidth/2 + 10, -carHeight/2 + 8, carWidth - 20, 18);

      ctx.restore();
    }

    function drawObstacles() {
      for (let obs of obstacles) {
        if (obs.type === "car") {
          ctx.fillStyle = "#ff3333";
          ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
          ctx.fillStyle = "#000";
          ctx.fillRect(obs.x + 10, obs.y + 20, obs.width - 20, 25);
        } else {
          ctx.fillStyle = "#888";
          ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
          ctx.fillStyle = "#555";
          ctx.fillRect(obs.x + 8, obs.y + 8, obs.width - 16, 12);
        }
      }
    }

    function drawParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        ctx.fillStyle = `rgba(255, 200, 0, ${p.life/25})`;
        ctx.fillRect(p.x, p.y, 6, 6);
        p.y += 8;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function update() {
      if (!gameRunning) return;

      // Controles
      let moveSpeed = 11;
      if (keys["ArrowLeft"] || keys["a"] || keys["A"]) {
        carX -= moveSpeed;
        carAngle = -12;
      }
      if (keys["ArrowRight"] || keys["d"] || keys["D"]) {
        carX += moveSpeed;
        carAngle = 12;
      }
      if (!keys["ArrowLeft"] && !keys["ArrowRight"] && !keys["a"] && !keys["A"] && !keys["d"] && !keys["D"]) {
        carAngle *= 0.85;
      }

      // Nitro
      if (keys[" "] && nitro > 0) {
        usingNitro = true;
        roadSpeed = 22;
        nitro -= 1.2;
        createParticles(carX + 10, carY + carHeight - 20, 4);
        createParticles(carX + carWidth - 20, carY + carHeight - 20, 4);
      } else {
        usingNitro = false;
        roadSpeed = Math.min(roadSpeed + 0.008, 18);
        if (nitro < 100) nitro += 0.25;
      }

      // Limites
      if (carX < 160) carX = 160;
      if (carX > 590) carX = 590;

      score += Math.floor(roadSpeed);
      if (score > highScore) highScore = score;

      // Gerar obstáculos
      if (Math.random() < 0.035) obstacles.push(new Obstacle());

      // Atualizar obstáculos
      for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        obs.y += obs.speed;

        // Colisão
        if (
          carX < obs.x + obs.width && carX + carWidth > obs.x &&
          carY < obs.y + obs.height && carY + carHeight > obs.y
        ) {
          gameRunning = false;
          gameOverScreen.style.display = "block";
          finalScoreEl.textContent = Math.floor(score / 8);
          highScoreEl.textContent = Math.floor(highScore / 8);
          localStorage.setItem("highScore", highScore);
        }

        if (obs.y > canvas.height) obstacles.splice(i, 1);
      }

      // Atualizar UI
      scoreEl.textContent = Math.floor(score / 8);
      speedEl.textContent = Math.floor(roadSpeed * 11);
      nitroEl.textContent = Math.floor(nitro);
    }

    function draw() {
      drawRoad();
      drawObstacles();
      drawCar();
      drawParticles();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    function restartGame() {
      carX = 370;
      obstacles = [];
      particles = [];
      score = 0;
      nitro = 100;
      roadSpeed = 12;
      gameRunning = true;
      gameOverScreen.style.display = "none";
    }

    gameLoop();
  </script>
</body>
</html>
